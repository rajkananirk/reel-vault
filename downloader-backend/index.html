<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Link Extractor</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #131a2c;
      --muted: #9ca3af;
      --text: #e5e7eb;
      --accent: #60a5fa;
      --accent-strong: #3b82f6;
      --success: #22c55e;
      --error: #ef4444;
      --border: #24304b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #111936, var(--bg) 50%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: min(860px, 100%);
      background: rgba(19, 26, 44, 0.9);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.4;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr auto;
    }

    input[type="url"] {
      width: 100%;
      background: #0d1427;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 14px;
      outline: none;
      font-size: 15px;
    }

    input[type="url"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.18);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 0 18px;
      background: var(--accent-strong);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
      transition: transform 0.08s ease, opacity 0.2s ease;
      min-height: 48px;
    }

    button:hover { opacity: 0.95; }
    button:active { transform: translateY(1px); }
    button:disabled { cursor: not-allowed; opacity: 0.6; }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .status {
      margin-top: 18px;
      min-height: 22px;
      font-size: 14px;
      font-weight: 500;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--error); }

    .result {
      display: none;
      margin-top: 18px;
      background: #0d1427;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      gap: 12px;
    }

    .row {
      display: grid;
      gap: 8px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    .value {
      font-size: 15px;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .actions a,
    .actions .secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 14px;
      min-height: 40px;
      font-weight: 600;
      font-size: 14px;
    }

    .actions a {
      background: #1d4ed8;
      color: #fff;
    }

    .actions .secondary {
      background: #1f2937;
      color: #f3f4f6;
      border: 1px solid #374151;
      cursor: pointer;
    }

    video {
      width: 100%;
      margin-top: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #000;
      max-height: 420px;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      button { width: 100%; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Video Link Extractor</h1>
    <p class="subtitle">
      Paste an Instagram, Facebook, or YouTube URL to extract a direct video link and title.
    </p>

    <form id="extractForm">
      <div class="grid">
        <input
          id="urlInput"
          name="url"
          type="url"
          required
          placeholder="https://www.instagram.com/reel/..."
        />
        <button id="submitBtn" type="submit">Extract</button>
      </div>
      <div class="hint">Supported: instagram.com, facebook.com, youtube.com, youtu.be</div>
    </form>

    <div id="status" class="status" aria-live="polite"></div>

    <section id="result" class="result">
      <div class="row">
        <div class="label">Title</div>
        <div id="titleValue" class="value"></div>
      </div>
      <div class="row">
        <div class="label">Direct Video URL</div>
        <div id="urlValue" class="value"></div>
      </div>
      <div class="actions">
        <a id="openLink" href="#" target="_blank" rel="noopener noreferrer">Open Video URL</a>
        <button class="secondary" id="copyBtn" type="button">Copy URL</button>
      </div>
      <video id="videoPreview" controls preload="metadata"></video>
    </section>
  </main>

  <script>
    const form = document.getElementById("extractForm");
    const urlInput = document.getElementById("urlInput");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const titleValue = document.getElementById("titleValue");
    const urlValue = document.getElementById("urlValue");
    const openLink = document.getElementById("openLink");
    const copyBtn = document.getElementById("copyBtn");
    const videoPreview = document.getElementById("videoPreview");

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function resetResult() {
      resultEl.style.display = "none";
      titleValue.textContent = "";
      urlValue.textContent = "";
      openLink.href = "#";
      videoPreview.removeAttribute("src");
      videoPreview.load();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const url = urlInput.value.trim();
      if (!url) return;

      submitBtn.disabled = true;
      submitBtn.textContent = "Extracting...";
      resetResult();
      setStatus("Processing URL...", "");

      try {
        const response = await fetch("http://192.168.1.10:8000/extract", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Request failed.");
        }

        titleValue.textContent = data.title || "Unknown title";
        urlValue.textContent = data.video_url;
        openLink.href = data.video_url;
        videoPreview.src = data.video_url;
        resultEl.style.display = "grid";
        setStatus("Success! Video details extracted.", "success");
      } catch (error) {
        setStatus(error.message || "Failed to extract video details.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Extract";
      }
    });

    copyBtn.addEventListener("click", async () => {
      const text = openLink.href;
      if (!text || text === "#") return;
      try {
        await navigator.clipboard.writeText(text);
        setStatus("Direct URL copied to clipboard.", "success");
      } catch {
        setStatus("Could not copy URL. Copy manually from result.", "error");
      }
    });
  </script>
</body>
</html>
